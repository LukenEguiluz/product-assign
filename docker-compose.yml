# Stack ligero para VPS: SQLite + 1 worker Gunicorn + nginx estático.
# Uso: cp env.example .env && nano .env && docker compose up -d --build
#
# Primer usuario admin:
#   docker compose exec api python manage.py createsuperuser

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,bsc.leyluz.com}
      DJANGO_DATA_DIR: /app/data
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-1}
      SECURE_SSL_BEHIND_PROXY: ${SECURE_SSL_BEHIND_PROXY:-1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://bsc.leyluz.com}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://bsc.leyluz.com}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - app_data:/app/data
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

volumes:
  app_data:
